<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Dad Joke Generator</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#f6d365,#fda085);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
}

.card {
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
  max-width:600px;
}

button {
  padding:12px 20px;
  border:none;
  border-radius:10px;
  margin-top:15px;
  cursor:pointer;
}

.primary { background:black; color:white; }
.secondary { background:#eee; }

#answer { display:none; margin-top:10px; }

.confetti {
  position:fixed;
  width:8px;
  height:12px;
  top:-20px;
  animation:fall 3s linear forwards;
}

@keyframes fall {
  to { transform:translateY(100vh) rotate(720deg); }
}
</style>
</head>

<body>

<div class="card">
  <h1>🎉 Dad Joke Generator 🎉</h1>

  <p id="question">Drück den Button 😎</p>
  <p id="answer"></p>

  <button class="primary" onclick="getJoke()">Neuer Witz</button>
  <button class="secondary" onclick="showAnswer()">Antwort zeigen</button>
</div>

<script>
let currentJoke = null;

async function getJoke() {
  const res = await fetch("https://official-joke-api.appspot.com/random_joke");
  const data = await res.json();

  currentJoke = data;

  document.getElementById("question").innerText = data.setup;
  document.getElementById("answer").innerText = data.punchline;
  document.getElementById("answer").style.display = "none";

  confetti(30);
}

function showAnswer() {
  document.getElementById("answer").style.display = "block";
  confetti(20);
}

function confetti(amount) {
  for (let i=0;i<amount;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=["red","blue","green","orange"][Math.floor(Math.random()*4)];
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}
</script>

</body>
</html>
